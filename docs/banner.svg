<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="JetBrains Mono, Fira Code, SF Mono, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141a2e"/>
      <stop offset="1"    stop-color="#1d1335"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#61afef"/>
      <stop offset="0.5" stop-color="#c678dd"/>
      <stop offset="1"   stop-color="#ff6b9d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0" stop-color="#61afef" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#61afef" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#3a4360" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#dots)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <g text-anchor="middle">
    <text x="640" y="120" fill="#f4f6fb" font-size="58" font-weight="700">BVH Raytracer</text>

    <text x="640" y="156" fill="#9aa4b2" font-size="19" font-weight="400">Estudio comparativo de estructuras de aceleraci&#243;n para trazado de rayos en CPU</text>

    <line x1="430" y1="184" x2="850" y2="184" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round"/>

    <text x="640" y="216" font-size="18" font-weight="600">
      <tspan fill="#61afef">SAH</tspan><tspan fill="#8b93a7"> &#183; </tspan><tspan fill="#e5c07b">Median</tspan><tspan fill="#8b93a7"> &#183; </tspan><tspan fill="#c678dd">Morton</tspan><tspan fill="#5c6370">      vs      </tspan><tspan fill="#ff6b9d">Intel Embree</tspan>
    </text>

    <text x="640" y="262" fill="#e6e6e6" font-size="20" font-weight="600">Kalos Lazo  &#183;  Lenin Chavez  &#183;  Marcelo Chincha</text>
    <text x="640" y="294" fill="#8b93a7" font-size="15">Prof. Luciano Romero</text>
  </g>
</svg>
